version: "3.5"

networks:
  invoiceso-net:
    name: invoiceso-net

volumes:
  redis-data:
  postgres-data:
  pgadmin-data:
  redisinsight-data:

services:
  redis:
    image: redis:6.2-alpine
    container_name: invoiceso-redis
    command: redis-server --requirepass "invoiceso_redis_pass"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - invoiceso-net

  database:
    image: postgres:14-alpine
    container_name: invoiceso-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: invoiceso_db_pass
      POSTGRES_DB: invoiceso_db
    restart: unless-stopped
    networks:
      - invoiceso-net

  pg-admin:
    image: dpage/pgadmin4
    container_name: invoiceso-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: invoiceso_pg_pass
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5480:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - database
    networks:
      - invoiceso-net

  user-backend:
    build:
      context: ../user-backend
      target: builder
    container_name: invoiceso-user-backend
    command: npm run start:dev
    stdin_open: true
    tty: true
    volumes:
      - ../user-backend:/home/node/app
      - /home/node/app/node_modules 
    ports:
      - "8002:8002"
    env_file: ../user-backend/.env
    depends_on:
      - database
      - redis
    restart: unless-stopped
    networks:
      - invoiceso-net